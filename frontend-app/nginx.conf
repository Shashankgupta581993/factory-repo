server {
    listen 8080;
    
    # Route 1: Serve the HTML frontend to the user's browser
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Route 2: Proxy API requests securely to your isolated backend VM
    location /api/ {
        proxy_pass http://10.128.0.3:8000/api/;
        client_max_body_size 10M; # Ensures you can upload larger CSV files
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}